name: Deploy examples + docs to GitHub Pages

# One Pages site, two halves:
#   /            -> the demo site (tools/build-site.mjs -> _site/)
#   /docs/       -> the pmndrs docs system's static export of docs/site/*.mdx
#
# The docs half runs ghcr.io/pmndrs/docs directly instead of the reusable
# workflow (pmndrs/docs/.github/workflows/build.yml@v3): that workflow mounts
# `./$MDX` at /app/docs but resolves $MDX inside the container, which only
# agrees when the mdx tree is literally `docs/` at repo root. Ours lives at
# docs/site/, so we run the same image with the mount and container path
# aligned (-v ./docs/site:/app/docs + MDX=docs). Same builder, same env
# contract, our layout.
#
# NOTE: Pages must be enabled once by a repo admin — Settings -> Pages ->
# Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one Pages deployment at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  demos:
    name: build demo site
    runs-on: ubuntu-latest
    steps:
      # Models are fetched from the jsDelivr CDN at runtime, so no git-LFS pull
      # is needed here (the .tza blobs never enter the browser bundle).
      - uses: actions/checkout@v4
      # Corepack must be enabled BEFORE setup-node: its `cache: yarn` step shells
      # out to yarn, and with a packageManager field pinning yarn 4 the stock
      # yarn 1 shim refuses to run.
      - name: Enable Corepack (yarn 4)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      # `--immutable` resolves the git-branch-pinned three-gpu-pathtracer fine
      # (the lockfile records the resolved commit); it just refetches that ref.
      - name: Install
        run: yarn install --immutable
      # The shipping package must be built first: the non-aliased examples import
      # its built `denoiser` dist.
      - name: Build denoiser
        run: yarn workspace denoiser build
      # Build the deployed examples and assemble _site/ (landing page at the
      # root, each example under /<name>/). Same script local verification uses.
      - name: Build + assemble site
        run: node tools/build-site.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: demos
          path: _site

  docs:
    name: build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build docs (pmndrs docs image)
        run: |
          set -ex
          docker run --rm --init \
            -v "./docs/site":/app/docs \
            -e MDX \
            -e NEXT_PUBLIC_LIBNAME \
            -e BASE_PATH \
            -e DIST_DIR \
            -e OUTPUT \
            -e HOME_REDIRECT \
            -e MDX_BASEURL \
            -e SOURCECODE_BASEURL \
            -e EDIT_BASEURL \
            -e NEXT_PUBLIC_URL \
            -e GITHUB \
            -e DISCORD \
            -e CONTRIBUTORS_PAT \
            ghcr.io/pmndrs/docs:3 pnpm run build
        env:
          # Container-relative: the mdx tree is mounted AT /app/docs.
          MDX: 'docs'
          NEXT_PUBLIC_LIBNAME: 'Denoiser'
          BASE_PATH: '/denoiser/docs'
          # Container path: /app/docs/out/denoiser/docs (= host docs/site/out/...)
          DIST_DIR: 'docs/out/denoiser/docs'
          OUTPUT: 'export'
          HOME_REDIRECT: '/getting-started/introduction'
          # Host-truth paths for images / edit links (the real repo location).
          MDX_BASEURL: 'https://github.com/${{ github.repository }}/raw/${{ github.ref_name }}/docs/site'
          SOURCECODE_BASEURL: 'https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}'
          EDIT_BASEURL: 'https://github.com/${{ github.repository }}/edit/${{ github.ref_name }}/docs/site'
          NEXT_PUBLIC_URL: 'https://pmndrs.github.io/denoiser/docs'
          GITHUB: 'https://github.com/pmndrs/denoiser'
          DISCORD: 'https://discord.gg/poimandres'
          CONTRIBUTORS_PAT: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/site/out/denoiser/docs

  bundle-deploy:
    name: merge + deploy
    needs: [demos, docs]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: demos
          path: ./site
      - uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: ./site/docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
