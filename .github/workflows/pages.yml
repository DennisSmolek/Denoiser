name: Deploy examples + docs to GitHub Pages

# One Pages site, two halves (the pmndrs/uikit pattern, base_path-verified):
#   /            -> the demo site (tools/build-site.mjs -> _site/)
#   /docs/       -> the pmndrs docs system's static export of docs/site/*.mdx
# The reusable docs workflow uploads its own `github-pages` artifact, so the
# bundle job merges both trees and deploys under a different artifact name.
#
# NOTE: Pages must be enabled once by a repo admin — Settings -> Pages ->
# Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one Pages deployment at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  demos:
    name: build demo site
    runs-on: ubuntu-latest
    steps:
      # Models are fetched from the jsDelivr CDN at runtime, so no git-LFS pull
      # is needed here (the .tza blobs never enter the browser bundle).
      - uses: actions/checkout@v4
      # Corepack must be enabled BEFORE setup-node: its `cache: yarn` step shells
      # out to yarn, and with a packageManager field pinning yarn 4 the stock
      # yarn 1 shim refuses to run.
      - name: Enable Corepack (yarn 4)
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      # `--immutable` resolves the git-branch-pinned three-gpu-pathtracer fine
      # (the lockfile records the resolved commit); it just refetches that ref.
      - name: Install
        run: yarn install --immutable
      # The shipping package must be built first: the non-aliased examples import
      # its built `denoiser` dist.
      - name: Build denoiser
        run: yarn workspace denoiser build
      # Build the deployed examples and assemble _site/ (landing page at the
      # root, each example under /<name>/). Same script local verification uses.
      - name: Build + assemble site
        run: node tools/build-site.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: demos
          path: _site

  docs:
    name: build docs site
    # pmndrs docs system: Next.js static export of docs/site/*.mdx, built for
    # the /denoiser/docs base path (same mechanism uikit uses for /uikit/docs).
    # Uploads a Pages artifact named `github-pages` that the bundle job unpacks.
    uses: pmndrs/docs/.github/workflows/build.yml@v3
    with:
      mdx: 'docs/site'
      libname: 'Denoiser'
      base_path: '/denoiser/docs'
      home_redirect: '/getting-started/introduction'
      github: 'https://github.com/pmndrs/denoiser'
      discord: 'https://discord.gg/poimandres'

  bundle:
    name: merge demos + docs
    needs: [demos, docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: demos
          path: ./site
      # The docs job's artifact is a Pages tarball (artifact.tar) — unpack it
      # under /docs/ in the merged tree.
      - uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: ./docs-artifact
      - name: Merge docs under /docs/
        run: |
          mkdir -p ./site/docs
          tar -xf ./docs-artifact/artifact.tar -C ./site/docs
      # deploy-pages needs a single-tar Pages artifact; `github-pages` is taken
      # by the docs job, so the merged one gets its own name.
      - name: Repack merged site
        run: tar -cf deploy.tar -C ./site .
      - uses: actions/upload-artifact@v4
        with:
          name: deploy
          path: deploy.tar

  deploy:
    name: deploy
    needs: bundle
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: deploy
